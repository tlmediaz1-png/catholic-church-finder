<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nearest Catholic Church Finder</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px}
button{padding:10px 16px;font-size:16px;cursor:pointer}
.card{border:1px solid #ccc;border-radius:8px;padding:12px;margin:10px 0}
.small{color:#555}
</style>
</head>
<body>
<h1>Nearest Catholic Church Finder</h1>
<p>Uses your current location and OpenStreetMap data to find nearby Catholic churches.</p>

<button onclick="findChurches()">Find Nearby Catholic Churches</button>

<div id="status"></div>
<div id="results"></div>

<script>
async function findChurches(){
  const status=document.getElementById('status');
  const results=document.getElementById('results');
  results.innerHTML='';
  status.innerHTML='Getting your location...';

  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    status.innerHTML='Searching...';

    const query=`
    [out:json];
    (
      node["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](around:30000,${lat},${lon});
      way["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](around:30000,${lat},${lon});
      relation["amenity"="place_of_worship"]["religion"="christian"]["denomination"="catholic"](around:30000,${lat},${lon});
    );
    out center tags;
    `;

    try{
      const response=await fetch("https://overpass-api.de/api/interpreter",{
        method:"POST",
        body:query
      });

      const data=await response.json();

      const churches=data.elements.map(el=>{
        const clat=el.lat || (el.center && el.center.lat);
        const clon=el.lon || (el.center && el.center.lon);

        const d=distance(lat,lon,clat,clon);

        return {
          name:(el.tags && el.tags.name) || "Catholic Church",
          distance:d,
          lat:clat,
          lon:clon
        };
      }).sort((a,b)=>a.distance-b.distance);

      if(!churches.length){
        status.innerHTML="No Catholic churches found within 30km.";
        return;
      }

      status.innerHTML=`Found ${churches.length} churches.`;

      churches.slice(0,10).forEach(c=>{
        const div=document.createElement('div');
        div.className='card';
        div.innerHTML=`
          <strong>${c.name}</strong><br>
          <span class="small">${c.distance.toFixed(1)} km away</span><br><br>
          <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lon}">
          Open in Google Maps
          </a>
        `;
        results.appendChild(div);
      });

    }catch(err){
      status.innerHTML='Error searching for churches.';
      console.error(err);
    }

  }, err=>{
    status.innerHTML='Location permission is required.';
  });
}

function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>
</body>
</html>
